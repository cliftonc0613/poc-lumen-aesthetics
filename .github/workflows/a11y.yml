name: Accessibility (axe-core)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  axe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js in background
        run: |
          npm run start &
          echo $! > .nextpid
        env:
          PORT: "3000"

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run axe-core against rendered page
        run: npx @axe-core/cli http://localhost:3000 --exit --tags wcag2a,wcag2aa,wcag21aa

      - name: Stop Next.js
        if: always()
        run: |
          if [ -f .nextpid ]; then kill $(cat .nextpid) || true; fi
